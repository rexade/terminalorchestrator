<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">

    <div><div style="height:54px;background:#60a5fa;border-radius:3px"></div><div class="mono" style="margin-top:6px;color:#e4e4e7">#60a5fa</div><div class="tiny">blue-400 · rule + dot</div></div>

    <div><div style="height:54px;background:#3b82f6;border-radius:3px"></div><div class="mono" style="margin-top:6px;color:#e4e4e7">#3b82f6</div><div class="tiny">blue-500 · btn hover</div></div>
    <div><div style="height:54px;background:#2563eb;border-radius:3px"></div><div class="mono" style="margin-top:6px;color:#e4e4e7">#2563eb</div><div class="tiny">blue-600 · btn fill</div></div>

  </div>
  <div style="display:flex;gap:14px;align-items:center;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:10px 12px">
    <div style="border-left:2px solid #60a5fa;background:#1f2937;padding:6px 10px">
      <div style="color:#f4f4f5;font-size:12px">▐ Claude</div>
    </div>
    <div class="tiny">left-rule + bg-active · the only "selected" treatment in the product</div>
  </div>
