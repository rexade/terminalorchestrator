<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">New-session dialog · the only rounded-lg surface</div>
  <div style="position:relative;background:rgba(0,0,0,.6);border-radius:4px;padding:22px;display:flex;justify-content:center">
    <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px;width:300px;display:flex;flex-direction:column;gap:12px">
      <div style="font-size:13px;color:#e4e4e7;font-weight:500">New Session</div>
      <div>
        <div class="label-xs" style="text-transform:uppercase;letter-spacing:.15em;margin-bottom:6px">Role</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
          <div style="background:rgba(37,99,235,.2);border:1px solid rgba(59,130,246,.5);border-radius:4px;padding:8px 0;text-align:center;color:#93c5fd;font-size:11px"><div>⬡</div><div style="margin-top:2px">Claude</div></div>
          <div style="background:#21262d;border:1px solid transparent;border-radius:4px;padding:8px 0;text-align:center;color:#71717a;font-size:11px;font-family:inherit"><div style="font-family:var(--font-mono)">$</div><div style="margin-top:2px">Shell</div></div>
          <div style="background:#21262d;border:1px solid transparent;border-radius:4px;padding:8px 0;text-align:center;color:#71717a;font-size:11px"><div>◈</div><div style="margin-top:2px">Server</div></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
        <button style="background:transparent;color:#71717a;border:0;font:inherit;font-size:11px;padding:4px 10px">Cancel</button>
        <button style="background:#2563eb;color:#fff;border:0;font:inherit;font-size:11px;padding:4px 14px;border-radius:4px">Open</button>
      </div>
    </div>
  </div>
</div></body></html>
