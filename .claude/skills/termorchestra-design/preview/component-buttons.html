<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Buttons</div>
  <div class="wrap">
    <button style="background:#2563eb;color:#fff;border:0;font:inherit;font-size:12px;padding:6px 16px;border-radius:4px;cursor:pointer">Open</button>
    <button style="background:transparent;color:#71717a;border:0;font:inherit;font-size:12px;padding:6px 12px;cursor:pointer">Cancel</button>
    <button style="background:#21262d;color:#71717a;border:0;font:inherit;font-size:12px;padding:4px 12px;border-radius:4px;cursor:pointer">+ New</button>
    <button style="background:#21262d;color:#71717a;border:0;font:inherit;font-size:12px;padding:4px 8px;border-radius:4px;cursor:pointer">⟨</button>
    <button style="background:transparent;color:#52525b;border:0;font:inherit;font-size:12px;cursor:pointer">+ws</button>
    <button style="background:transparent;color:#71717a;border:0;font:inherit;font-size:16px;cursor:pointer;line-height:1">⊕</button>
  </div>
  <div class="tiny">primary (blue-600) · ghost · chrome · icon. No press transforms; hover is color-shift only.</div>
</div></body></html>
