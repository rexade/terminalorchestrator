<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Action glyphs</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px 0;text-align:center"><div style="font-size:18px;color:#a1a1aa">⊕</div><div class="tiny" style="margin-top:4px">new session</div></div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px 0;text-align:center"><div style="font-size:18px;color:#a1a1aa">⟨</div><div class="tiny" style="margin-top:4px">compact</div></div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px 0;text-align:center"><div style="font-size:18px;color:#a1a1aa">⟩</div><div class="tiny" style="margin-top:4px">expand</div></div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px 0;text-align:center"><div style="font-size:18px;color:#a1a1aa">▸</div><div class="tiny" style="margin-top:4px">collapsed</div></div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px 0;text-align:center"><div style="font-size:18px;color:#a1a1aa">▾</div><div class="tiny" style="margin-top:4px">expanded</div></div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px 0;text-align:center"><div style="font-size:18px;color:#60a5fa">↓</div><div class="tiny" style="margin-top:4px">jump latest</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px;display:flex;align-items:center;gap:10px"><div style="font-size:18px;color:#ef4444">⚠</div><div class="tiny">error · red-500</div></div>
    <div style="background:#161b22;border:1px solid #21262d;border-radius:4px;padding:10px;display:flex;align-items:center;gap:10px;font-family:var(--font-mono)"><div style="font-size:18px;color:#e6edf3">❯</div><div class="tiny">prompt marker · mono</div></div>
  </div>
</div></body></html>
