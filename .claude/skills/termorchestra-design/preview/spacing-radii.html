<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Radii · very small</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div><div style="height:64px;background:#21262d;border-radius:2px"></div><div class="mono" style="margin-top:6px;color:#e4e4e7">2px</div><div class="tiny">rounded-sm</div></div>
    <div><div style="height:64px;background:#21262d;border-radius:4px"></div><div class="mono" style="margin-top:6px;color:#e4e4e7">4px</div><div class="tiny">rounded · buttons, inputs</div></div>
    <div><div style="height:64px;background:#161b22;border:1px solid #30363d;border-radius:8px"></div><div class="mono" style="margin-top:6px;color:#e4e4e7">8px</div><div class="tiny">rounded-lg · dialog only</div></div>
    <div><div style="height:64px;background:#21262d;border-radius:9999px"></div><div class="mono" style="margin-top:6px;color:#e4e4e7">full</div><div class="tiny">status dots</div></div>
  </div>
</div></body></html>
