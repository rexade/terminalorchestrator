<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Layout scale · fixed chrome</div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:160px;height:32px;background:#161b22;border:1px solid #21262d;border-radius:2px"></div>
      <span class="mono" style="color:#e4e4e7">h-8 · 32px</span><span class="tiny">toolbar</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:160px;height:20px;background:#161b22;border:1px solid #21262d;border-radius:2px"></div>
      <span class="mono" style="color:#e4e4e7">h-5 · 20px</span><span class="tiny">statusbar</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:160px;height:44px;background:#0d1117;border:1px solid #21262d;border-radius:2px"></div>
      <span class="mono" style="color:#e4e4e7">w-40 · 160px</span><span class="tiny">sidebar normal</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:44px;height:44px;background:#0d1117;border:1px solid #21262d;border-radius:2px"></div>
      <span class="mono" style="color:#e4e4e7">w-11 · 44px</span><span class="tiny">sidebar compact</span>
    </div>
  </div>
</div></body></html>
