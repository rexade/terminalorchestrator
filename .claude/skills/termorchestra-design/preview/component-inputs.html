<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow">Form controls</div>
  <div class="col">
    <label class="label-xs" style="text-transform:uppercase;letter-spacing:.15em">Workspace</label>
    <input value="Workspace name..." style="background:#21262d;color:#e4e4e7;font:inherit;font-size:12px;border:1px solid #30363d;border-radius:4px;padding:4px 10px;width:240px;outline:none">
  </div>
  <div class="col">
    <label class="label-xs" style="text-transform:uppercase;letter-spacing:.15em">Folder</label>
    <select style="background:#21262d;color:#a1a1aa;font:inherit;font-size:12px;border:1px solid #30363d;border-radius:4px;padding:6px 10px;width:320px">
      <option>~/projects/spritepose</option>
      <option>~/code/termorchestra</option>
      <option>~ (home)</option>
    </select>
  </div>
  <div class="col">
    <label class="label-xs" style="text-transform:uppercase;letter-spacing:.15em">Type</label>
    <div class="row" style="gap:8px">
      <button style="background:#21262d;color:#e4e4e7;border:1px solid rgba(88,166,255,.5);border-radius:4px;padding:4px 14px;font:inherit;font-size:12px">local</button>
      <button style="background:#21262d;color:#71717a;border:1px solid transparent;border-radius:4px;padding:4px 14px;font:inherit;font-size:12px">wsl</button>
    </div>
  </div>
</div></body></html>
